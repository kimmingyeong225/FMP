<html>
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <!-- Bootstrap 5  -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', sans-serif;
    }
    .form-box {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      padding: 2rem;
      max-width: 400px;
      margin: 10vh auto;
    }
    .form-title {
      text-align: center;
      color: #667eea;
      font-weight: bold;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
    }
    .btn-purple {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      border: none;
      width: 100%;
      font-size: 1rem;
      padding: 0.75rem;
      border-radius: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <div class="form-title">회원가입</div>
    <form action="/signup" method="post">
      <div class="mb-3">
        <label>아이디</label>
        <input type="text" name="userId" class="form-control">
      </div>
      <div class="mb-3">
        <label>비밀번호</label>
        <input type="password" name="password" class="form-control">
      </div>
      <div class="mb-3">
        <label>이름</label>
        <input type="text" name="name" class="form-control">
      </div>
      <div class="mb-3">
        <label>생년월일</label>
        <input type="date" name="birth" class="form-control">
      </div>
      <div class="mb-3">
        <label>전화번호</label>
        <input type="text" name="phone" class="form-control">
      </div>
      <div class="mb-3">
        <label>성별</label>
        <select name="gender" class="form-control">
          <option value="남자">남자</option>
          <option value="여자">여자</option>
        </select>
      </div>
      <div class="mb-3">
        <label>학부</label>
        <input type="text" name="department" class="form-control">
      </div>
      <div class="mb-3">
        <label>학과</label>
        <input type="text" name="major" class="form-control">
      </div>
      <div class="mb-3">
        <label>학년</label>
        <input type="number" name="schoolYear" min="1" max="5" class="form-control">
      </div>
      <div class="mb-3">
        <label>학번</label>
        <input type="text" name="studentId" class="form-control">
      </div>
      <div class="mb-3">
        <label>프로필 이미지</label>
        <input type="text" name="profileImage" placeholder="예: image.jpg" class="form-control">
      </div>
      <button type="submit" class="btn btn-purple">가입하기</button>
    </form>
  </div>

</body>
</html>
