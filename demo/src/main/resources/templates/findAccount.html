<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>아이디·비밀번호 찾기</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', sans-serif;
    }
    .form-box {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      padding: 2rem;
      max-width: 400px;
      margin: 10vh auto;
    }
    .form-title {
      text-align: center;
      color: #667eea;
      font-weight: bold;
      font-size: 1.8rem;
      margin-bottom: 2rem;
    }
    .btn-purple {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      border: none;
      width: 100%;
      font-size: 1rem;
      padding: 0.75rem;
      border-radius: 1.5rem;
      margin-top: 1rem;
    }
	.result-box {
	  background: white;
	  padding: 1.2rem;
	  border-radius: 1rem;
	  box-shadow: 0 0 10px rgba(0,0,0,0.1);
	  color: #333;
	  margin-top: 1.5rem;
	  text-align: center;
	  font-weight: bold;
	}
    hr {
      margin: 2rem 0;
    }
  </style>
</head>
<body>

	<!--아이디-->
	<div class="form-box">
	    <div class="form-title">아이디 찾기</div>
		<form onsubmit="return findId(event);">
	      <div class="mb-3">
	        <label>이름</label>
	        <input type="text" name="name" id="id-name" class="form-control">
	      </div>
	      <div class="mb-3">
	        <label>전화번호</label>
	        <input type="text" name="phone" id="id-phone" class="form-control">
	      </div>
	      <button type="submit" class="btn-purple">아이디 찾기</button>
	    </form>
		<div id="resultBoxId" class="result-box" style="display: none;"></div>

	    <hr>

		<!--비밀번호-->
	    <div class="form-title" style="font-size: 1.4rem;">비밀번호 찾기</div>
		<form onsubmit="return findPassword(event);">
	      <div class="mb-3">
	        <label>아이디</label>
	        <input type="text" name="userId" id="pw-userId" class="form-control">
	      </div>
	      <div class="mb-3">
	        <label>이름</label>
	        <input type="text" name="name" id="pw-name" class="form-control">
	      </div>
	      <div class="mb-3">
	        <label>전화번호</label>
	        <input type="text" name="phone" id="pw-phone" class="form-control">
	      </div>
	      <button type="submit" class="btn-purple">비밀번호 찾기</button>
	    </form>
		<div id="resultBoxPw" class="result-box" style="display: none;"></div>
	  </div>
	 
	  (<!--아이디 찾기용-->)
	  <script>
	  function findId(event) {
	    event.preventDefault();

	    const name = document.getElementById("id-name").value;
	    const phone = document.getElementById("id-phone").value;

	    fetch("/find-id", {
	      method: "POST",
	      headers: { "Content-Type": "application/x-www-form-urlencoded" },
	      body: `name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`
	    })
	    .then(res => res.text())
	    .then(msg => {
	      const box = document.getElementById("resultBoxId");
	      box.innerText = msg;
	      box.style.display = "block";
	    });

	    return false;
	  }
	  </script>
	  
	  <!-- 비밀번호 찾기용-->
	  <script>
	  function findPassword(event) {
	    event.preventDefault();

	    const userId = document.getElementById("pw-userId").value;
	    const name = document.getElementById("pw-name").value;
	    const phone = document.getElementById("pw-phone").value;

	    fetch("/find-password", {
	      method: "POST",
	      headers: { "Content-Type": "application/x-www-form-urlencoded" },
	      body: `userId=${encodeURIComponent(userId)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`
	    })
	    .then(res => res.text())
	    .then(msg => {
	      const box = document.getElementById("resultBoxPw");
	      box.innerText = msg;
	      box.style.display = "block";
	    });

	    return false;
	  }
	  </script>
	</body>
	</html>
